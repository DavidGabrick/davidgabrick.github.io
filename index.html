<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Gabrick | Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body { background: #0a0a0a; color: #eaeaea; line-height: 1.6; }

    nav {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px 0;
    }

    nav a { color: #aaa; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: white; }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 { font-size: 3.5rem; }
    .hero p { color: #aaa; }

    section {
      padding: 100px 10%;
      max-width: 1000px;
      margin: auto;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">
  <h1>David Gabrick</h1>
  <p>Mechanical Engineering Student | CAD | Design</p>
</div>

<section id="about">
  <h2>About Me</h2>
  <p>
    Mechanical engineering student focused on CAD design and product development.
  </p>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="projects">
    <!-- Add projects later -->
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  © 2026 David Gabrick
</footer>

</body>
</html>
